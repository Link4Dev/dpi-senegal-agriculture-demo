version: '3.8'

services:
  web:
    image: odoo:16.0
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    # 1. On dit à Odoo d'aller chercher les modules dans le dossier partagé mnt/extra-addons
    command: odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
    # 2. On connecte le dossier de votre projet GitHub au conteneur Odoo
    volumes:
      - .:/mnt/extra-addons
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
